services:
  redis:
    image: redis:7.4-alpine
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
